name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          mkdir -p app
          keytool -genkeypair -v -storetype JKS -keystore app/keystore.jks -alias appkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass VirtuaLoc2026 -keypass VirtuaLoc2026 \
            -dname "CN=sting, OU=dev, O=sting, L=Beijing, C=CN"
          echo "keystore_exists=true" >> $GITHUB_ENV

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --rerun-tasks 2>&1 | tee build.log
          echo "=== APK location ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Check APK
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APK found"
          echo "=== Build log tail ==="
          tail -30 build.log

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
