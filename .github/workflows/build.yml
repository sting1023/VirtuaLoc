name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          if (-not (Test-Path env:ANDROID_SDK_ROOT)) { $env:ANDROID_SDK_ROOT = "C:\\android-sdk" }

      - name: Build
        run: |
          echo "sdk.dir=$env:ANDROID_SDK_ROOT" | Out-File -FilePath local.properties -Encoding ASCII
          ./gradlew assembleDebug --no-daemon

      - name: Get APK info
        run: |
          echo "APK exists:"
          ls -la app/build/outputs/apk/debug/app-debug.apk
          echo "File size: $((Get-Item app/build/outputs/apk/debug/app-debug.apk).Length) bytes"

      - name: Upload via PowerShell GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $apkPath = "app/build/outputs/apk/debug/app-debug.apk"
          $token = "$env:GH_TOKEN"
          $apkBytes = [System.IO.File]::ReadAllBytes($apkPath)
          $apkBase64 = [Convert]::ToBase64String($apkBytes)
          Write-Host "APK_BASE64_LENGTH=$($apkBase64.Length)"
          
          # Create release
          $tag = "v1.2-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          $body = @{{
            tag_name = $tag
            name = "VirtuaLoc $tag"
            draft = $false
            prerelease = $false
          }} | ConvertTo-Json -Compress
          
          $headers = @{{
            Authorization = "token $token"
            Accept = "application/vnd.github.v3+json"
            "Content-Type" = "application/json"
          }}
          
          $createResp = Invoke-RestMethod -Uri "https://api.github.com/repos/sting1023/VirtuaLoc/releases" `
            -Method POST -Body $body -Headers $headers
          Write-Host "Created release: $($createResp.id) Upload URL: $($createResp.upload_url)"
          
          # Upload asset
          $uploadUrl = ($createResp.upload_url -replace '\{{.*', '') + "?name=virtualloc-debug.apk"
          $assetResp = Invoke-RestMethod -Uri $uploadUrl -Method POST `
            -InFile $apkPath `
            -Headers @{{ Authorization = "token $token"; "Content-Type" = "application/octet-stream" }}
          Write-Host "Asset URL: $($assetResp.browser_download_url)"
          
          # Also write to job summary
          Write-Host "## APK Ready" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "Download: $($assetResp.browser_download_url)" >> $env:GITHUB_STEP_SUMMARY
