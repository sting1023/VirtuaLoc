name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          if (-not (Test-Path env:ANDROID_SDK_ROOT)) { $env:ANDROID_SDK_ROOT = "C:\android-sdk" }

      - name: Build
        run: |
          echo "sdk.dir=$env:ANDROID_SDK_ROOT" | Out-File -FilePath local.properties -Encoding ASCII
          ./gradlew assembleDebug --no-daemon 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

