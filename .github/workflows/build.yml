name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const apkPath = 'app/build/outputs/apk/debug/app-debug.apk';
            if (!fs.existsSync(apkPath)) {
              core.setFailed('APK not found at ' + apkPath);
              return;
            }
            const stats = fs.statSync(apkPath);
            console.log('APK size:', stats.size);
            const release = await github.rest.repos.createRelease({
              owner: 'sting1023',
              repo: 'VirtuaLoc',
              tag_name: 'v1.2-build' + Date.now(),
              name: 'VirtuaLoc v1.2 Debug',
              draft: false,
              prerelease: false
            });
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);

      - name: Upload APK to Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const apkPath = 'app/build/outputs/apk/debug/app-debug.apk';
            const releaseId = '${{ steps.create_release.outputs.release_id }}';
            const uploadUrl = '${{ steps.create_release.outputs.upload_url }}'.replace('{?name,label}', '');
            console.log('Uploading to:', uploadUrl);
            const apkBuffer = fs.readFileSync(apkPath);
            const response = await fetch(uploadUrl + '?name=virtualloc-debug.apk', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ${{ secrets.GITHUB_TOKEN }}',
                'Content-Type': 'application/octet-stream',
                'Content-Length': apkBuffer.length
              },
              body: apkBuffer
            });
            console.log('Upload status:', response.status);
            const data = await response.json();
            console.log('Uploaded:', data.browser_download_url);
