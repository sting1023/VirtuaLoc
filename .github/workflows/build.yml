name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          if (-not (Test-Path env:ANDROID_SDK_ROOT)) { $env:ANDROID_SDK_ROOT = "C:\android-sdk" }

      - name: Build
        run: |
          echo "sdk.dir=$env:ANDROID_SDK_ROOT" | Out-File -FilePath local.properties -Encoding ASCII
          ./gradlew assembleDebug --no-daemon

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v1.2-build" + [DateTimeOffset]::Now.ToUnixTimeMilliseconds()
          $body = @{
            tag_name = $tag
            name = "VirtuaLoc $tag"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json
          $resp = Invoke-RestMethod -Uri "https://api.github.com/repos/sting1023/VirtuaLoc/releases" -Method POST -Body $body -Headers @{Authorization="token $env:GH_TOKEN"; Accept="application/vnd.github.v3+json"} -ContentType "application/json"
          Write-Host "Created release ID: $($resp.id) Upload URL: $($resp.upload_url)"
          $uploadUrl = $resp.upload_url -replace '\{.*', ''
          $apkPath = "app/build/outputs/apk/debug/app-debug.apk"
          Write-Host "APK size: $((Get-Item $apkPath).Length)"
          Invoke-RestMethod -Uri "$uploadUrl?name=virtualloc-debug.apk" -Method POST -InFile $apkPath -Headers @{Authorization="token $env:GH_TOKEN"; Content-Type="application/octet-stream"}
          Write-Host "Upload complete"
