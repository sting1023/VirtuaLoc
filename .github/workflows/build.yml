name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          if (-not (Test-Path env:ANDROID_SDK_ROOT)) {
            $env:ANDROID_SDK_ROOT = "C:\Android\android-sdk"
          }
        shell: powershell

      - name: Build
        run: |
          Remove-Item local.properties -ErrorAction SilentlyContinue
          "sdk.dir=C:\Android\android-sdk" | Out-File -FilePath local.properties -Encoding ASCII
          Get-Content local.properties
          & cmd /c "gradlew.bat assembleDebug --no-daemon 2>&1"
        shell: powershell

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

