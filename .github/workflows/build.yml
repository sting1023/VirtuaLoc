name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: |
          if exist "C:\Users\Administrator\AppData\Local\Android\Sdk" (
            echo sdk.dir=C:\Users\Administrator\AppData\Local\Android\Sdk > local.properties
          ) else (
            echo sdk.dir=%ANDROID_SDK_ROOT% > local.properties
          )
          type local.properties
          .\gradlew.bat assembleDebug --no-daemon 2>&1
        shell: cmd

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

