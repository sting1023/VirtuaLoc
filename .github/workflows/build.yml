name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build
        run: |
          cmd /c "echo sdk.dir=%ANDROID_SDK_ROOT% > local.properties"
          cmd /c "type local.properties"
          cmd /c "gradlew.bat assembleDebug --no-daemon"
        working-directory: ${{ github.workspace }}

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

