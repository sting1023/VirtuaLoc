name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        run: |
          Remove-Item local.properties -ErrorAction SilentlyContinue
          if ($env:ANDROID_SDK_ROOT) {
            "sdk.dir=$env:ANDROID_SDK_ROOT" | Out-File -FilePath local.properties -Encoding ASCII
          }
          Get-Content local.properties -ErrorAction SilentlyContinue
          cmd /c "gradlew.bat assembleDebug --no-daemon"
        shell: powershell

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

