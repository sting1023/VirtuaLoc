name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          if (-not (Test-Path env:ANDROID_SDK_ROOT)) {
            $env:ANDROID_SDK_ROOT = "C:\Users\Administrator\AppData\Local\Android\Sdk"
          }
          echo "ANDROID_SDK_ROOT=$env:ANDROID_SDK_ROOT"

      - name: Build
        run: |
          $sdk = if ($env:ANDROID_SDK_ROOT) { $env:ANDROID_SDK_ROOT } else { "C:\Users\Administrator\AppData\Local\Android\Sdk" }
          echo "sdk.dir=$sdk" | Out-File -FilePath local.properties -Encoding ASCII
          Get-Content local.properties
          .\gradlew.bat assembleDebug --no-daemon 2>&1 | Select-Object -Last 60

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/virtualloc-debug.apk
          retention-days: 1
          overwrite: true

