name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate keystore if not exists in app/
        run: |
          if [ ! -f app/keystore.jks ]; then
            keytool -genkeypair -v -storetype JKS -keystore app/keystore.jks -alias appkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass VirtuaLoc2026 -keypass VirtuaLoc2026 \
              -dname "CN=sting, OU=dev, O=sting, L=Beijing, C=CN"
            echo "keystore_generated=true" >> $GITHUB_ENV
          else
            echo "Using existing keystore"
            echo "keystore_generated=false" >> $GITHUB_ENV
          fi

      - name: Commit keystore to repo
        if: env.keystore_generated == 'true'
        run: |
          git config --local user.email "bot@openclaw"
          git config --local user.name "bot"
          git add app/keystore.jks
          git commit -m "chore: add keystore for signing"
          git push origin main

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          if [ -f app/keystore.jks ]; then
            ./gradlew assembleDebug --no-daemon --no-build-cache \
              -PkeystoreFile=app/keystore.jks \
              -PkeystorePassword=VirtuaLoc2026 \
              -PkeyAlias=appkey \
              -PkeyPassword=VirtuaLoc2026 2>&1
          else
            ./gradlew assembleDebug --no-daemon --no-build-cache 2>&1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtualloc-debug
          path: app/build/outputs/apk/debug/app-debug.apk
